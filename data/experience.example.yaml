experience:
  - id: "acme_analytics_swe"
    organization: "Acme Analytics Inc."
    role: "Software Engineer"
    location: "San Francisco, CA"
    dates: "June 2024 -- Present"
    tags: ["swe", "data-engineering", "ml", "backend"]
    bullets:
      - description: >-
          Built real-time data ingestion pipelines processing 500K+ events per
          second from IoT sensors. Used Kafka for message streaming, Flink for
          stream processing, and PostgreSQL for persistent storage. Implemented
          exactly-once delivery guarantees using idempotent writes.
        tech_stack: ["Python", "Kafka", "Apache Flink", "PostgreSQL"]
        skills: ["data-engineering", "streaming", "distributed-systems", "backend"]
        metrics: "500K+ events/sec throughput, exactly-once delivery"
        context: "Core data infrastructure serving 50+ internal analytics consumers"

      - description: >-
          Designed and deployed a feature store serving ML models in production.
          Implemented point-in-time-correct feature lookups to prevent data leakage
          during model training. Reduced feature computation latency from hours
          to minutes using materialized views and incremental aggregation.
        tech_stack: ["Python", "Redis", "PostgreSQL", "Apache Airflow"]
        skills: ["mlops", "feature-engineering", "database-design", "performance"]
        metrics: "feature latency reduced from hours to minutes, serving 12 ML models"
        context: "Enabled self-serve feature access for the data science team"

      - description: >-
          Implemented comprehensive observability stack with structured logging,
          distributed tracing, and custom Grafana dashboards. Set up PagerDuty
          alerting with runbooks for common failure modes. Reduced mean time to
          resolution (MTTR) for pipeline incidents.
        tech_stack: ["Grafana", "OpenTelemetry", "PagerDuty", "Python"]
        skills: ["observability", "monitoring", "incident-response", "devops"]
        metrics: "MTTR reduced by 60%, 15+ runbooks created"
        context: "On-call rotation covers 3 engineers; observability was critical for scalability"

  - id: "healthtech_lab_intern"
    organization: "HealthTech Research Lab"
    role: "Data Science Intern"
    location: "Boston, MA"
    dates: "May 2023 -- August 2023"
    tags: ["ds", "ml", "healthcare", "research"]
    bullets:
      - description: >-
          Developed predictive models for patient readmission risk using gradient
          boosted trees and logistic regression on electronic health records.
          Handled class imbalance with SMOTE and cost-sensitive learning.
          Validated models using stratified k-fold cross-validation.
        tech_stack: ["Python", "scikit-learn", "XGBoost", "pandas"]
        skills: ["machine-learning", "healthcare", "classification", "model-validation"]
        metrics: "AUC-ROC improved from 0.72 to 0.84 over baseline"
        context: "Collaboration with hospital clinical informatics team"

      - description: >-
          Built automated ETL pipelines to extract, clean, and transform raw EHR
          data into analysis-ready datasets. Standardized diagnosis codes (ICD-10)
          and medication records across multiple hospital systems.
        tech_stack: ["Python", "SQL", "Apache Airflow"]
        skills: ["etl", "data-engineering", "healthcare", "data-quality"]
        metrics: "processed 2M+ patient records across 3 hospital systems"
        context: "Data quality was a major bottleneck before pipeline automation"

